[buildPlans.RamsevkaMonoPreview]
family = "Ramsevka Mono Preview"
spacing = "normal"
serifs = "sans"
noCvSs = false
exportGlyphNames = true

  [buildPlans.RamsevkaMonoPreview.variants]
  inherits = "ss15"

  [buildPlans.RamsevkaMonoPreview.ligations]
  inherits = "dlig"

    [buildPlans.RamsevkaMonoPreview.variants.design]
    one = "base-flat-top-serif"
    two = "straight-neck-serifed"
    three = "flat-top-serifed"
    four = "open-serifed"
    five = "upright-flat-serifed"
    six = "straight-bar"
    seven = "straight-serifed-crossbar"
    eight = "crossing"
    zero = "tall-slashed-cutout"

[buildPlans.RamsevkaMonoPreview.weights.Regular]
shape = 400
menu = 400
css = 400

