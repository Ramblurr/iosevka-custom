[buildPlans.RamsevkaMono]
family = "Ramsevka Mono"
spacing = "normal"
serifs = "sans"
noCvSs = false
exportGlyphNames = true

  [buildPlans.RamsevkaMono.variants]
  inherits = "ss15"

  [buildPlans.RamsevkaMono.ligations]
  inherits = "dlig"

    [buildPlans.RamsevkaMono.variants.design]
    one = "base-flat-top-serif"
    two = "straight-neck-serifed"
    three = "flat-top-serifed"
    four = "open-serifed"
    five = "upright-flat-serifed"
    six = "straight-bar"
    seven = "straight-serifed-crossbar"
    eight = "crossing"
    zero = "tall-slashed-cutout"

[buildPlans.RamsevkaMono.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.RamsevkaMono.weights.Medium]
shape = 500
menu = 500
css = 500

[buildPlans.RamsevkaMono.weights.SemiBold]
shape = 600
menu = 600
css = 600

[buildPlans.RamsevkaMono.weights.Bold]
shape = 700
menu = 700
css = 700

